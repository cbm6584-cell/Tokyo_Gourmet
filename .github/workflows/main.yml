name: Update Tokyo Food Map Data

on:
  schedule:
    - cron: '0 15 * * *' # 매일 한국 시간 자정(밤 12시)에 자동 실행
  workflow_dispatch: # 내가 원할 때 수동으로 버튼을 눌러서 실행할 수 있는 기능

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 로봇이 새 데이터를 파일에 덮어쓸 수 있도록 권한 부여

    steps:
    - name: 1. 내 깃허브 코드 불러오기
      uses: actions/checkout@v4

    - name: 2. 파이썬 설치하기
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 필요 부품(라이브러리) 조립하기
      run: pip install -r requirements.txt

    - name: 4. 🚀 유튜브 데이터 수집 엔진 가동 (API 금고 키 사용)
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      run: python main.py

    - name: 5. 새로 수집된 데이터를 깃허브에 덮어쓰기 (자동 세이브)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add restaurants.json blog_top10.html
        git commit -m "🤖 Auto-update restaurant data" || exit 0
        git push
